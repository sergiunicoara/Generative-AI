app = "graphrag-api-sn"
primary_region = "ams"

[build]
  dockerfile = "../../Dockerfile"
  [build.args]
    SERVICE = "api"

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONPATH = "/app"
  ENV = "production"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "30s"
    grace_period = "60s"

[[mounts]]
  source = "kpi_data"
  destination = "/data"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
