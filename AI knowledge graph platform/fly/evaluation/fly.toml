app = "graphrag-evaluation"
primary_region = "ams"

[build]
  dockerfile = "../../Dockerfile"
  [build.args]
    SERVICE = "evaluation"

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONPATH = "/app"
  ENV = "production"
  LOG_LEVEL = "INFO"

# Evaluation worker does not expose HTTP
[[mounts]]
  source = "kpi_data"
  destination = "/data"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  evaluation = "python workers/evaluation_worker.py"
