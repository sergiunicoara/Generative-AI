<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Cartea lui Ioan</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  canvas.bg { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #bgA { z-index:0; }
  #bgB { z-index:1; opacity:0; transition:opacity 2.4s ease; }
  body { font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto; overflow-x:hidden; background:#111; }
  #scene-label { position:fixed; top:14px; right:16px; z-index:20; background:rgba(0,0,0,.38); backdrop-filter:blur(8px); color:#fff; padding:6px 16px; border-radius:20px; font-size:.82rem; font-weight:700; letter-spacing:.5px; opacity:0; transition:opacity .5s; pointer-events:none; }
  #scene-label.vis { opacity:1; }
  #app { width:100%; max-width:700px; position:relative; z-index:10; }
  .header { text-align:center; margin-bottom:20px; color:#fff; }
  .header h1 { font-size:1.7rem; font-weight:800; text-shadow:0 3px 10px rgba(0,0,0,.5); letter-spacing:1px; }
  .header .subtitle { font-size:.9rem; opacity:.88; margin-top:4px; }
  .progress-bar-wrap { background:rgba(255,255,255,.25); border-radius:20px; height:9px; margin-top:12px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:#fff; border-radius:20px; transition:width .4s ease; }
  .score-badge { display:inline-block; background:rgba(255,255,255,.22); color:#fff; padding:5px 16px; border-radius:20px; font-size:.85rem; margin-top:8px; font-weight:600; }
  .card { background:rgba(255,255,255,.93); backdrop-filter:blur(16px); border-radius:22px; padding:28px 28px 24px; box-shadow:0 10px 45px rgba(0,0,0,.35); animation:fadeSlide .35s ease; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .card-label { display:flex; align-items:center; gap:8px; font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:#7c3aed; margin-bottom:14px; }
  .card-label span.dot { width:8px; height:8px; background:#7c3aed; border-radius:50%; display:inline-block; }
  .question-text { font-size:1.1rem; line-height:1.65; color:#1a2a3a; font-weight:500; margin-bottom:24px; }
  .question-text .blank { display:inline-block; border-bottom:2.5px solid #7c3aed; min-width:80px; margin:0 4px; color:#7c3aed; font-weight:700; }
  .answers      { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .answers.n3   { grid-template-columns:1fr 1fr 1fr; }
  .answers.n2   { grid-template-columns:1fr 1fr; max-width:420px; margin:0 auto; }
  @media(max-width:480px){ .answers,.answers.n3{ grid-template-columns:1fr } }
  .answer-btn { background:#f3f0ff; border:2.5px solid #c4b5fd; border-radius:14px; padding:12px 16px; font-size:.93rem; color:#1a2a3a; cursor:pointer; text-align:left; transition:all .18s ease; line-height:1.4; }
  .answer-btn:hover:not(:disabled) { background:#ede9fe; border-color:#7c3aed; transform:translateY(-2px); }
  .answer-btn.selected { background:#ede9fe; border-color:#7c3aed; transform:translateY(-2px); }
  .answer-btn.selected .letter { background:#7c3aed; }
  .btn-confirm { display:block; width:100%; margin-top:14px; padding:13px; background:linear-gradient(135deg,#059669,#10b981); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:.4px; transition:opacity .2s; }
  .btn-confirm:hover { opacity:.88; }
  .answer-btn .letter { display:inline-block; width:26px; height:26px; background:#7c3aed; color:#fff; border-radius:50%; text-align:center; line-height:26px; font-weight:700; font-size:.82rem; margin-right:10px; vertical-align:middle; }
  .answer-btn.correct { background:#dcfce7; border-color:#22c55e; color:#14532d; }
  .answer-btn.correct .letter { background:#22c55e; }
  .answer-btn.wrong { background:#fee2e2; border-color:#ef4444; color:#7f1d1d; }
  .answer-btn.wrong .letter { background:#ef4444; }
  .answer-btn:disabled { cursor:default; transform:none; }
  .feedback { margin-top:18px; padding:12px 16px; border-radius:12px; font-size:.92rem; line-height:1.5; display:none; }
  .feedback.show { display:block; animation:fadeSlide .2s ease; }
  .feedback.correct-fb { background:#dcfce7; color:#14532d; border-left:4px solid #22c55e; }
  .feedback.wrong-fb   { background:#fee2e2; color:#7f1d1d; border-left:4px solid #ef4444; }
  .btn-next { display:block; width:100%; margin-top:18px; padding:14px; background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; border:none; border-radius:14px; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:.5px; transition:opacity .2s; }
  .btn-next:hover { opacity:.88; }
  .final-card { text-align:center; padding:40px 28px; }
  .final-card .trophy { font-size:4rem; margin-bottom:12px; }
  .final-card h2 { font-size:1.7rem; color:#7c3aed; margin-bottom:8px; }
  .final-card .score-big { font-size:3rem; font-weight:800; color:#a855f7; margin:10px 0; }
  .final-card .score-label { font-size:1rem; color:#555; margin-bottom:20px; }
  .final-card .msg { font-size:1.05rem; color:#333; margin-bottom:26px; line-height:1.6; }
  .q-counter { font-size:.8rem; color:#999; margin-bottom:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
  /* ── Selector screen ── */
  #selectorScreen { width:100%; max-width:700px; position:relative; z-index:10; display:none; }
  .sel-header { text-align:center; margin-bottom:24px; color:#fff; }
  .sel-header h1 { font-size:1.7rem; font-weight:800; text-shadow:0 3px 10px rgba(0,0,0,.5); letter-spacing:1px; }
  .sel-header p { font-size:.9rem; opacity:.88; margin-top:6px; }
  .rounds-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:520px){ .rounds-grid { grid-template-columns:repeat(2,1fr); } }
  .round-btn { background:rgba(255,255,255,.92); backdrop-filter:blur(16px); border:2.5px solid transparent; border-radius:18px; padding:22px 14px; cursor:pointer; text-align:center; transition:all .2s; box-shadow:0 6px 24px rgba(0,0,0,.28); }
  .round-btn:hover { transform:translateY(-3px); box-shadow:0 12px 36px rgba(0,0,0,.38); background:#fff; }
  .round-btn .rb-icon { font-size:2.2rem; margin-bottom:10px; display:block; }
  .round-btn .rb-name { font-size:1rem; font-weight:800; color:#7c3aed; display:block; }
  .round-btn .rb-sub { font-size:.76rem; color:#888; margin-top:5px; display:block; }
  .round-btn.special { background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(124,58,237,.18)); border-color:rgba(124,58,237,.5); }
  .round-btn.special .rb-name { color:#6d28d9; }
  /* Review screen */
  .review-card { padding:28px; }
  .review-header { text-align:center; margin-bottom:28px; }
  .review-header h2 { font-size:1.6rem; color:#ef4444; margin-bottom:8px; }
  .review-header p { font-size:.95rem; color:#666; }
  .wrong-item { background:#fee2e2; border:2px solid #ef4444; border-radius:14px; padding:18px; margin-bottom:16px; }
  .wrong-item .question-part { margin-bottom:14px; }
  .wrong-item .q-text { font-size:1rem; font-weight:600; color:#7f1d1d; margin-bottom:8px; }
  .wrong-item .answer-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:10px; font-size:.93rem; }
  .wrong-item .answer-row > div { padding:10px; border-radius:8px; }
  .wrong-item .selected { background:#fca5a5; color:#7f1d1d; border-left:3px solid #ef4444; padding-left:7px; }
  .wrong-item .correct { background:#dcfce7; color:#14532d; border-left:3px solid #22c55e; padding-left:7px; }
  .wrong-item .feedback-text { font-size:.9rem; color:#666; padding:10px; background:#fff; border-radius:8px; border-left:3px solid #666; }
  .review-btn { display:block; width:100%; margin-top:18px; padding:14px; background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; border:none; border-radius:14px; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:.5px; transition:opacity .2s; }
  .review-btn:hover { opacity:.88; }
</style>
</head>
<body>
<canvas class="bg" id="bgA"></canvas>
<canvas class="bg" id="bgB"></canvas>
<div id="scene-label"></div>
<div id="selectorScreen">
  <div class="sel-header">
    <h1>✨ Cartea lui Ioan ✨</h1>
    <p>Îndreaptarul cunoașterii biblice — alege un set</p>
  </div>
  <div class="rounds-grid" id="roundsGrid"></div>
</div>
<div id="app" style="display:none">
  <div class="header">
    <h1>✨ Cartea lui Ioan ✨</h1>
    <p class="subtitle" id="roundTitle">Îndreaptarul cunoașterii biblice</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="score-badge" id="scoreDisplay">Puncte: 0 / 0</div>
  </div>
  <div class="card" id="quizCard"></div>
</div>
<script src="questions.js"></script>
<script>
// ════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════
function rnd(a,b){return a+Math.random()*(b-a);}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function lerp(a,b,t){return a+(b-a)*t;}

// ════════════════════════════════════════════════════════════
// SHARED DRAWING HELPERS
// ════════════════════════════════════════════════════════════

function star5(ctx,cx,cy,r,col,alpha){
  ctx.save();ctx.globalAlpha=alpha??1;ctx.fillStyle=col;
  ctx.beginPath();
  for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,rad=i%2?r*.42:r;i?ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a)):ctx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));}
  ctx.closePath();ctx.fill();ctx.restore();
}

function smileSun(ctx,cx,cy,r,t){
  ctx.save();
  for(let i=0;i<12;i++){const a=i/12*Math.PI*2+t*.4,r1=r*1.25,r2=r*1.78+Math.sin(t*2+i)*(r*.07);ctx.strokeStyle='#FFD700';ctx.lineWidth=r*.1;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx+r1*Math.cos(a),cy+r1*Math.sin(a));ctx.lineTo(cx+r2*Math.cos(a),cy+r2*Math.sin(a));ctx.stroke();}
  ctx.fillStyle='#FFE840';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.28)';ctx.beginPath();ctx.ellipse(cx-r*.22,cy-r*.25,r*.36,r*.2,-.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7a4500';[-.28,.28].forEach(dx=>{ctx.beginPath();ctx.arc(cx+dx*r,cy-r*.08,r*.09,0,Math.PI*2);ctx.fill();});
  ctx.strokeStyle='#7a4500';ctx.lineWidth=r*.09;ctx.lineCap='round';ctx.beginPath();ctx.arc(cx,cy+r*.12,r*.28,.15,Math.PI-.15);ctx.stroke();
  ctx.restore();
}

function rainbow(ctx,cx,cy,rad,alpha){
  const cols=['#FF2222','#FF8800','#FFEE00','#22CC22','#2288FF','#8822CC'];
  ctx.save();ctx.globalAlpha=alpha;
  cols.forEach((c,i)=>{ctx.strokeStyle=c;ctx.lineWidth=rad*.04;ctx.beginPath();ctx.arc(cx,cy,rad*(1-i*.05),Math.PI,0);ctx.stroke();});
  ctx.restore();
}

function fluffyCloud(ctx,cx,cy,w,h2,col,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=col;
  [[0,0,.55],[-.28,.12,.38],[.28,.12,.38],[-.48,.28,.28],[.48,.28,.28],[0,.32,.32]].forEach(([dx,dy,fr])=>{ctx.beginPath();ctx.arc(cx+dx*w,cy+dy*h2*2,fr*h2*2,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

function pineTree(ctx,x,by,sz,col){
  ctx.fillStyle=col;const tw=sz*.52;
  for(let i=0;i<3;i++){const ly=by-sz*(.18+i*.26),lw=tw*(1-i*.18);ctx.beginPath();ctx.moveTo(x,by-sz*(.42+i*.27));ctx.lineTo(x+lw/2,ly);ctx.lineTo(x-lw/2,ly);ctx.closePath();ctx.fill();}
  ctx.fillRect(x-sz*.06,by-sz*.18,sz*.12,sz*.18);
}

function roundTree(ctx,x,by,sz,tc,lc){
  ctx.fillStyle=tc;ctx.fillRect(x-sz*.08,by-sz*.22,sz*.16,sz*.22);
  ctx.fillStyle=lc;ctx.beginPath();ctx.arc(x,by-sz*.52,sz*.45,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.ellipse(x-sz*.1,by-sz*.62,sz*.2,sz*.14,-.5,0,Math.PI*2);ctx.fill();
}

function mushroom(ctx,cx,by,sz){
  ctx.fillStyle='#f0ddc0';ctx.beginPath();ctx.ellipse(cx,by-sz*.22,sz*.22,sz*.28,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e82020';ctx.beginPath();ctx.arc(cx,by-sz*.52,sz*.52,Math.PI,0);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.82)';
  [[-.2,-.64,.1],[.16,-.58,.08],[.04,-.8,.07],[-.35,-.5,.06]].forEach(([dx,dy,r])=>{ctx.beginPath();ctx.arc(cx+dx*sz,by+dy*sz,r*sz,0,Math.PI*2);ctx.fill();});
}

function flower(ctx,cx,by,sz,col){
  ctx.strokeStyle='#4a8a20';ctx.lineWidth=sz*.1;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,by);ctx.lineTo(cx,by-sz*.9);ctx.stroke();
  ctx.fillStyle=col;
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*sz*.32,by-sz*.9+Math.sin(a)*sz*.32,sz*.2,sz*.12,a,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#FFE840';ctx.beginPath();ctx.arc(cx,by-sz*.9,sz*.16,0,Math.PI*2);ctx.fill();
}

function butterfly(ctx,cx,cy,sz,c1,c2,t,ph){
  const flap=0.15+0.85*Math.abs(Math.sin(t*5+ph));
  ctx.save();ctx.globalAlpha=.88;
  [[c1,-1],[c2,1]].forEach(([col,s])=>{
    ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx+s*flap*sz*.55,cy-sz*.28,flap*sz*.6,sz*.45,s*.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+s*flap*sz*.42,cy+sz*.15,flap*sz*.45,sz*.3,-s*.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(cx+s*flap*sz*.45,cy-sz*.3,sz*.1,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#333';ctx.globalAlpha=1;ctx.beginPath();ctx.ellipse(cx,cy,sz*.07,sz*.48,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBalloon(ctx,cx,cy,r,cols){
  const n=cols.length;cols.forEach((col,i)=>{const a1=i/n*Math.PI*2-Math.PI/2,a2=(i+1)/n*Math.PI*2-Math.PI/2;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a1,a2);ctx.closePath();ctx.fill();});
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#a07830';ctx.fillRect(cx-r*.22,cy+r+4,r*.44,r*.3);
  ctx.strokeStyle='#8B6914';ctx.lineWidth=1;[-.22,.22].forEach(dx=>{ctx.beginPath();ctx.moveTo(cx+dx*r,cy+r+4);ctx.lineTo(cx+dx*r*.7,cy+r);ctx.stroke();});
}

function drawMtnLayer(ctx,w,h,by,profile,step,color){
  ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,h);
  profile.forEach((v,i)=>ctx.lineTo(i*step,by-v));
  ctx.lineTo(w,h);ctx.closePath();ctx.fill();
}
function mtnProfile(w,step,comps){
  return Array.from({length:Math.ceil(w/step)+1},(_,xi)=>comps.reduce((s,[amp,f,ph])=>s+amp*Math.sin(f*xi*step/w*Math.PI*2+ph),0));
}

// ════════════════════════════════════════════════════════════
// COMPLEX CHARACTERS
// ════════════════════════════════════════════════════════════

// ── Rocket (detailed) ──────────────────────────────────────
function drawRocket(ctx,cx,cy,sz,ang){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  // Body
  const bg=ctx.createLinearGradient(-sz*.3,0,sz*.3,0);bg.addColorStop(0,'#dde8f8');bg.addColorStop(.5,'#ffffff');bg.addColorStop(1,'#c0d0e0');
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,sz*.28,sz*.62,0,0,Math.PI*2);ctx.fill();
  // Nose cone
  ctx.fillStyle='#ff3333';ctx.beginPath();ctx.moveTo(0,-sz*.62);ctx.lineTo(-sz*.28,-sz*.22);ctx.lineTo(sz*.28,-sz*.22);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.ellipse(-sz*.05,-sz*.42,sz*.06,sz*.14,-.3,0,Math.PI*2);ctx.fill();
  // Porthole
  ctx.fillStyle='#aadeff';ctx.beginPath();ctx.arc(0,-sz*.1,sz*.13,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#99bbcc';ctx.lineWidth=sz*.04;ctx.beginPath();ctx.arc(0,-sz*.1,sz*.13,0,Math.PI*2);ctx.stroke();
  // Cross on porthole
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=sz*.025;
  ctx.beginPath();ctx.moveTo(-sz*.13,-sz*.1);ctx.lineTo(sz*.13,-sz*.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-sz*.23);ctx.lineTo(0,sz*.03);ctx.stroke();
  // Fins
  ctx.fillStyle='#3366ff';
  [[-1],[1]].forEach(([s])=>{ctx.beginPath();ctx.moveTo(s*sz*.28,sz*.28);ctx.lineTo(s*sz*.65,sz*.72);ctx.lineTo(s*sz*.28,sz*.58);ctx.closePath();ctx.fill();ctx.fillStyle='#5588ff';ctx.beginPath();ctx.moveTo(s*sz*.28,sz*.28);ctx.lineTo(s*sz*.58,sz*.65);ctx.lineTo(s*sz*.3,sz*.55);ctx.closePath();ctx.fill();ctx.fillStyle='#3366ff';});
  // Flame
  const fl=ctx.createRadialGradient(0,sz*.82,0,0,sz*.82,sz*.34);
  fl.addColorStop(0,'#ffff88');fl.addColorStop(.35,'#ff8800');fl.addColorStop(1,'transparent');
  ctx.fillStyle=fl;ctx.beginPath();ctx.ellipse(0,sz*.8,sz*.14,sz*.3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── UFO with alien ──────────────────────────────────────────
function drawUFO(ctx,cx,cy,sz,t){
  ctx.save();
  // Glow
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,sz*1.6);
  glow.addColorStop(0,'rgba(100,220,100,.18)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(cx-sz*2,cy-sz*2,sz*4,sz*4);
  // Beam (intermittent)
  const beamStr=Math.max(0,Math.sin(t*.7)*.4);
  if(beamStr>0){
    const bm=ctx.createLinearGradient(cx,cy+sz*.22,cx,cy+sz*2.8);
    bm.addColorStop(0,`rgba(100,255,100,${beamStr})`);bm.addColorStop(1,'rgba(100,255,100,0)');
    ctx.fillStyle=bm;ctx.beginPath();ctx.moveTo(cx-sz*.3,cy+sz*.22);ctx.lineTo(cx+sz*.3,cy+sz*.22);ctx.lineTo(cx+sz*.9,cy+sz*2.8);ctx.lineTo(cx-sz*.9,cy+sz*2.8);ctx.closePath();ctx.fill();
  }
  // Main disk
  const disk=ctx.createLinearGradient(cx-sz,cy-sz*.15,cx-sz,cy+sz*.22);
  disk.addColorStop(0,'#c8cce0');disk.addColorStop(.5,'#9899b0');disk.addColorStop(1,'#70718a');
  ctx.fillStyle=disk;ctx.beginPath();ctx.ellipse(cx,cy,sz,sz*.22,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(cx,cy-sz*.04,sz*.85,sz*.16,0,0,Math.PI*2);ctx.stroke();
  // Spinning lights
  for(let i=0;i<10;i++){const a=i/10*Math.PI*2+t*2,lx=cx+sz*.72*Math.cos(a),ly=cy+sz*.06*Math.sin(a)*.4;
    ctx.fillStyle=i%2?'#ff4444':'#ffee00';ctx.beginPath();ctx.arc(lx,ly,sz*.07,0,Math.PI*2);ctx.fill();}
  // Glass dome
  const dome=ctx.createLinearGradient(cx-sz*.42,cy-sz*.6,cx+sz*.42,cy);
  dome.addColorStop(0,'rgba(180,220,255,.75)');dome.addColorStop(.6,'rgba(100,160,220,.55)');dome.addColorStop(1,'rgba(60,120,190,.4)');
  ctx.fillStyle=dome;ctx.beginPath();ctx.ellipse(cx,cy-sz*.05,sz*.42,sz*.52,0,Math.PI,0);ctx.fill();
  ctx.strokeStyle='rgba(150,200,255,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(cx,cy-sz*.05,sz*.42,sz*.52,0,Math.PI,0);ctx.stroke();
  // Dome reflection
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.ellipse(cx-sz*.12,cy-sz*.32,sz*.1,sz*.22,-.4,0,Math.PI*2);ctx.fill();
  // Alien
  ctx.fillStyle='#70e870';ctx.beginPath();ctx.ellipse(cx,cy-sz*.38,sz*.2,sz*.24,0,0,Math.PI*2);ctx.fill();
  // Big eyes

// ── Astronaut ──────────────────────────────────────────────

  ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(cx-sz*.04,cy-sz*.32,sz*.07,sz*.12,-.5,0,Math.PI*2);ctx.fill();
  // Face visible through visor
  ctx.fillStyle='rgba(255,200,160,.6)';ctx.beginPath();ctx.ellipse(cx+sz*.05,cy-sz*.22,sz*.13,sz*.16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(80,40,20,.5)';ctx.beginPath();ctx.arc(cx,cy-sz*.24,sz*.04,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+sz*.1,cy-sz*.24,sz*.04,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

// ── Falling leaf ───────────────────────────────────────────
function drawLeaf(ctx,cx,cy,sz,col,rot){

// ── Eagle ──────────────────────────────────────────────────
function drawEagle(ctx,cx,cy,sz,t){
  ctx.save();
  const flap=Math.sin(t*1.8)*sz*.12;
  // Shadow / wing shadow
  ctx.fillStyle='rgba(0,0,0,.08)';ctx.beginPath();ctx.ellipse(cx,cy+sz*.18,sz*.9,sz*.12,0,0,Math.PI*2);ctx.fill();
  // Wings

  ctx.fillStyle=wc;
  // Left wing
  ctx.beginPath();ctx.moveTo(cx-sz*.12,cy);ctx.bezierCurveTo(cx-sz*.55,cy-sz*.55+flap,cx-sz,cy-sz*.3+flap,cx-sz*.98,cy-sz*.15+flap);ctx.bezierCurveTo(cx-sz*.7,cy+sz*.25,cx-sz*.2,cy+sz*.1,cx-sz*.1,cy+sz*.06);ctx.fill();
  // Wing feather tips (left)
  ctx.strokeStyle='#2a1808';ctx.lineWidth=sz*.025;
  for(let i=0;i<5;i++){const fx=cx-sz*(.55+i*.1),fy=cy-sz*.28+flap;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx-sz*.06,fy+sz*.2);ctx.stroke();}
  // Right wing
  ctx.fillStyle=wc;ctx.beginPath();ctx.moveTo(cx+sz*.12,cy);ctx.bezierCurveTo(cx+sz*.55,cy-sz*.55+flap,cx+sz,cy-sz*.3+flap,cx+sz*.98,cy-sz*.15+flap);ctx.bezierCurveTo(cx+sz*.7,cy+sz*.25,cx+sz*.2,cy+sz*.1,cx+sz*.1,cy+sz*.06);ctx.fill();
  for(let i=0;i<5;i++){const fx=cx+sz*(.55+i*.1),fy=cy-sz*.28+flap;ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+sz*.06,fy+sz*.2);ctx.stroke();}
  // Body
  ctx.fillStyle='#2a1808';ctx.beginPath();ctx.ellipse(cx,cy,sz*.38,sz*.2,0,0,Math.PI*2);ctx.fill();
  // White tail
  ctx.fillStyle='#e8e8e8';ctx.beginPath();ctx.moveTo(cx+sz*.32,cy+sz*.06);ctx.bezierCurveTo(cx+sz*.5,cy+sz*.28,cx+sz*.62,cy+sz*.32,cx+sz*.42,cy+sz*.15);ctx.fill();
  // White head
  ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.arc(cx-sz*.3,cy-sz*.04,sz*.17,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(220,220,200,.4)';ctx.beginPath();ctx.ellipse(cx-sz*.28,cy-sz*.1,sz*.1,sz*.14,-.3,0,Math.PI*2);ctx.fill();
  // Yellow beak
  ctx.fillStyle='#e8c000';ctx.beginPath();ctx.moveTo(cx-sz*.46,cy-sz*.05);ctx.lineTo(cx-sz*.66,cy);ctx.lineTo(cx-sz*.48,cy+sz*.07);ctx.closePath();ctx.fill();
  ctx.fillStyle='#c09000';ctx.beginPath();ctx.moveTo(cx-sz*.46,cy-sz*.02);ctx.lineTo(cx-sz*.64,cy);ctx.lineTo(cx-sz*.48,cy+sz*.04);ctx.closePath();ctx.fill();
  // Eye
  ctx.fillStyle='#f0c000';ctx.beginPath();ctx.arc(cx-sz*.35,cy-sz*.07,sz*.055,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(cx-sz*.35,cy-sz*.07,sz*.03,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── Mountain cabin ────────────────────────────────────────
function drawCabin(ctx,cx,by,sz){
  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(cx,by,sz*.75,sz*.1,0,0,Math.PI*2);ctx.fill();
  // Main walls
  const wall=ctx.createLinearGradient(cx-sz*.65,0,cx+sz*.65,0);wall.addColorStop(0,'#a06030');wall.addColorStop(.5,'#c07840');wall.addColorStop(1,'#8a5020');
  ctx.fillStyle=wall;ctx.fillRect(cx-sz*.65,by-sz*.75,sz*1.3,sz*.75);
  // Wood panel lines
  ctx.strokeStyle='#7a4818';ctx.lineWidth=sz*.022;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(cx-sz*.65,by-sz*(.12+i*.14));ctx.lineTo(cx+sz*.65,by-sz*(.12+i*.14));ctx.stroke();}
  // Vertical corner logs
  ctx.fillStyle='#8a4818';ctx.fillRect(cx-sz*.68,by-sz*.76,sz*.1,sz*.76);ctx.fillRect(cx+sz*.58,by-sz*.76,sz*.1,sz*.76);
  // Roof
  const roof=ctx.createLinearGradient(cx,by-sz*1.2,cx,by-sz*.75);roof.addColorStop(0,'#2a1408');roof.addColorStop(1,'#4a2a10');
  ctx.fillStyle=roof;ctx.beginPath();ctx.moveTo(cx,by-sz*1.22);ctx.lineTo(cx-sz*.82,by-sz*.75);ctx.lineTo(cx+sz*.82,by-sz*.75);ctx.closePath();ctx.fill();
  // Roof highlight
  ctx.fillStyle='rgba(255,200,150,.1)';ctx.beginPath();ctx.moveTo(cx,by-sz*1.22);ctx.lineTo(cx+sz*.1,by-sz*1.22);ctx.lineTo(cx+sz*.82,by-sz*.75);ctx.lineTo(cx+sz*.7,by-sz*.75);ctx.closePath();ctx.fill();
  // Snow on roof
  ctx.fillStyle='#deeeff';ctx.beginPath();ctx.moveTo(cx-sz*.82,by-sz*.75);ctx.lineTo(cx,by-sz*1.22);ctx.lineTo(cx+sz*.82,by-sz*.75);ctx.lineTo(cx+sz*.78,by-sz*.77);ctx.lineTo(cx,by-sz*1.18);ctx.lineTo(cx-sz*.78,by-sz*.77);ctx.closePath();ctx.fill();
  // Chimney
  ctx.fillStyle='#6a3820';ctx.fillRect(cx+sz*.28,by-sz*1.32,sz*.2,sz*.42);
  ctx.fillStyle='#4a2810';ctx.fillRect(cx+sz*.26,by-sz*1.34,sz*.24,sz*.06);
  // Smoke puffs
  [0,1,2].forEach(i=>{const sa=((Date.now()/3000+i*.33)%1);const sy=by-sz*(1.34+sa*.6);const salpha=(1-sa)*.5;ctx.save();ctx.globalAlpha=salpha;ctx.fillStyle='#ddddee';ctx.beginPath();ctx.arc(cx+sz*.38,sy,sz*(.05+sa*.12),0,Math.PI*2);ctx.fill();ctx.restore();});
  // Door
  ctx.fillStyle='#4a2010';ctx.beginPath();ctx.arc(cx,by-sz*.2,sz*.19,Math.PI,0);ctx.fill();ctx.fillRect(cx-sz*.19,by-sz*.2,sz*.38,sz*.2);
  ctx.fillStyle='#5a3018';ctx.beginPath();ctx.arc(cx,by-sz*.2,sz*.15,Math.PI,0);ctx.fill();ctx.fillRect(cx-sz*.15,by-sz*.2,sz*.3,sz*.2);
  // Door handle
  ctx.fillStyle='#d4a000';ctx.beginPath();ctx.arc(cx+sz*.08,by-sz*.1,sz*.03,0,Math.PI*2);ctx.fill();
  // Windows
  [[-sz*.4],[sz*.4]].forEach(([wx])=>{
    ctx.fillStyle='#ffe890';ctx.beginPath();ctx.arc(cx+wx,by-sz*.48,sz*.14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a06030';ctx.lineWidth=sz*.035;ctx.beginPath();ctx.arc(cx+wx,by-sz*.48,sz*.14,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#8a4820';ctx.lineWidth=sz*.025;ctx.beginPath();ctx.moveTo(cx+wx-sz*.14,by-sz*.48);ctx.lineTo(cx+wx+sz*.14,by-sz*.48);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+wx,by-sz*.62);ctx.lineTo(cx+wx,by-sz*.34);ctx.stroke();
  });
  ctx.restore();
}

// ── Aurora borealis ────────────────────────────────────────
function drawAurora(ctx,w,h,t){
  ctx.save();
  [[0,200,100,.3],[0,100,255,.25],[150,0,255,.2],[0,220,180,.22]].forEach(([r,g,b,str],idx)=>{
    const off=idx*.9+t*.22;
    const grad=ctx.createLinearGradient(0,0,0,h*.5);
    grad.addColorStop(0,`rgba(${r},${g},${b},${str})`);
    grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.moveTo(0,0);
    for(let x=0;x<=w;x+=12){
      const y=h*.08+h*.1*Math.sin(x/w*Math.PI*5+off)+h*.04*Math.sin(x/w*Math.PI*9+off*1.4);
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.lineTo(w,0);ctx.closePath();ctx.fill();
  });
  ctx.restore();
}

    const t=age/1000;
    const sky=ctx.createLinearGradient(0,0,0,h*.55);sky.addColorStop(0,'#87CEEB');sky.addColorStop(.6,'#B8E8A0');sky.addColorStop(1,'#90EE90');
    ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);
    smileSun(ctx,w*.12,h*.13,38,t);
    [[w*.38,h*.1,130,.86],[w*.68,h*.07,110,.78],[w*.85,h*.17,90,.7]].forEach(([cx,cy,cw,al])=>fluffyCloud(ctx,cx,cy,cw,cw*.4,'#fff',al));
    // Ground
    const grd=ctx.createLinearGradient(0,h*.7,0,h);grd.addColorStop(0,'#4CAF50');grd.addColorStop(.4,'#2E7D32');grd.addColorStop(1,'#1B5E20');
    ctx.fillStyle=grd;ctx.fillRect(0,h*.7,w,h*.3);
    s.farT.forEach(tr=>pineTree(ctx,tr.x,h*.72,tr.sz,tr.col));
    s.roundT.forEach(tr=>roundTree(ctx,tr.x,h*.74,tr.sz,'#8B6914',tr.col));
    s.midT.forEach(tr=>pineTree(ctx,tr.x,h*.75,tr.sz,tr.col));
    s.nearT.forEach(tr=>pineTree(ctx,tr.x,h*.78,tr.sz,tr.col));
    // Mist
    for(let i=0;i<4;i++){const my=h*.68+i*10+Math.sin(t*.4+i)*4;const mg=ctx.createLinearGradient(0,my,0,my+38);mg.addColorStop(0,`rgba(220,240,220,${.09-i*.018})`);mg.addColorStop(1,'rgba(220,240,220,0)');ctx.fillStyle=mg;ctx.fillRect(0,my,w,38);}
    s.mush.forEach(m=>mushroom(ctx,m.x,h*.72,m.sz));
    s.flws.forEach(f=>flower(ctx,f.x,h*.72,f.sz,f.col));
    // Foreground animals, kept bright and large so they read clearly.
    ctx.fillStyle='rgba(255,245,190,.2)';ctx.beginPath();ctx.ellipse(w*.13,h*.68,100,54,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(w*.86,h*.69,120,60,0,0,Math.PI*2);ctx.fill();
    drawOwl(ctx,w*.12,h*.42,74,t);
    drawOwl(ctx,w*.88,h*.36,62,t+1.1);
    drawFox(ctx,w*.16,h*.66,70,t);
    drawFox(ctx,w*.84,h*.68,82,t+.6);
    // Falling leaves
    s.leaves.forEach(lf=>{const p=((age+lf.offset)%lf.period)/lf.period;const ly=h*.2+p*h*.58;const lx=lf.x+Math.sin(p*Math.PI*6+lf.offset)*28;const rot=p*Math.PI*5;const al=p<.1?p/.1:p>.82?(1-p)/.18:1;drawLeaf(ctx,lx,ly,lf.sz,lf.col,rot);});
    s.bfly.forEach(b=>{b.x+=b.vx+Math.sin(t*.7+b.phase)*.4;b.y+=b.vy+Math.cos(t*.5+b.phase)*.3;if(b.x<-30)b.x=w+30;if(b.x>w+30)b.x=-30;if(b.y<h*.05)b.vy=Math.abs(b.vy);if(b.y>h*.72)b.vy=-Math.abs(b.vy);butterfly(ctx,b.x,b.y,b.sz,b.c1,b.c2,t,b.phase);});
    s.ff.forEach(f=>{f.x+=f.vx+Math.sin(t*.6+f.phase)*.3;f.y+=f.vy+Math.cos(t*.5+f.phase)*.2;if(f.x<0)f.x=w;if(f.x>w)f.x=0;if(f.y<h*.15)f.y=h*.7;if(f.y>h*.75)f.y=h*.2;const gw=.35+.65*(0.5+0.5*Math.sin(t*f.gsp+f.phase));const rg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,12);rg.addColorStop(0,`rgba(200,255,80,${gw})`);rg.addColorStop(1,'rgba(180,255,50,0)');ctx.fillStyle=rg;ctx.fillRect(f.x-12,f.y-12,24,24);ctx.fillStyle=`rgba(240,255,160,${gw})`;ctx.beginPath();ctx.arc(f.x,f.y,2.2,0,Math.PI*2);ctx.fill();});
   }
  },

  // ── 3  MOUNTAINS ────────────────────────────────────────
  {name:'🌈 Munți',
   init(w,h){
    const step=5;
    const far=mtnProfile(w,step,[[h*.16,2.1,.4],[h*.09,3.7,1.1],[h*.06,6.3,2.2]]);
    const mid=mtnProfile(w,step,[[h*.23,1.8,.9],[h*.13,3.2,2.0],[h*.07,5.5,3.3]]);
    const near=mtnProfile(w,step,[[h*.31,1.4,1.5],[h*.16,2.9,.6],[h*.08,4.8,1.8]]);
    const clouds=Array.from({length:7},()=>({x:rnd(0,w),y:rnd(h*.08,h*.34),cw:rnd(90,220),sp:rnd(.14,.5)}));
    const stars=Array.from({length:42},()=>({x:rnd(0,w),y:rnd(0,h*.36),r:rnd(1.2,3.5),phase:rnd(0,Math.PI*2),sp:rnd(.5,2)}));
    const snowflakes=Array.from({length:22},()=>({x:rnd(0,w),period:rnd(4500,9500),offset:rnd(0,12000),sz:rnd(2.5,5.5)}));
    const balloonPos={x:rnd(w*.25,w*.65),y:rnd(h*.14,h*.32),cols:pick([['#FF7A8A','#FFE066','#7BD88F','#67C8FF'],['#FFB86B','#FF8BD1','#B7A7FF','#6FE7DD'],['#FF8A65','#FFD166','#7DDC8A','#62B6FF']])};
    return{far,mid,near,clouds,stars,snowflakes,balloonPos,step};
   },
   draw(ctx,w,h,age,s){
    const t=age/1000;
    // Bright mountain morning
    const sky=ctx.createLinearGradient(0,0,0,h*.68);sky.addColorStop(0,'#78c8ff');sky.addColorStop(.34,'#a7ddff');sky.addColorStop(.58,'#ffd4a8');sky.addColorStop(.78,'#ffe8a3');sky.addColorStop(1,'#fff6cf');
    ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);
    const sunGlow=ctx.createRadialGradient(w*.78,h*.16,0,w*.78,h*.16,w*.38);
    sunGlow.addColorStop(0,'rgba(255,255,210,.5)');
    sunGlow.addColorStop(1,'rgba(255,255,210,0)');
    ctx.fillStyle=sunGlow;ctx.fillRect(0,0,w,h*.7);
    // Soft sparkle
    s.stars.forEach(st=>{const tw=(0.15+0.45*(0.5+0.5*Math.sin(t*st.sp+st.phase)))*Math.max(0,1-st.y/(h*.36));star5(ctx,st.x,st.y,st.r,'#fffaf0',tw);});
    // Rainbow
    rainbow(ctx,w*.5,h*.68,w*.54,.5+.12*Math.sin(t*.25));
    // Clouds
    s.clouds.forEach(c=>{c.x+=c.sp;if(c.x-c.cw>w)c.x=-c.cw;fluffyCloud(ctx,c.x,c.y,c.cw,c.cw*.38,'#ffffff',.86+.06*Math.sin(t*.4+c.x*.01));});
    // Hot air balloon
    const bx=s.balloonPos.x+Math.sin(t*.35)*32,by=s.balloonPos.y+Math.sin(t*.22+1)*20;
    drawBalloon(ctx,bx,by,44,s.balloonPos.cols);
    // Eagle circling
    const eAng=t*.28,eR=w*.16,eCx=w*.38,eCy=h*.22;
    const ex=eCx+eR*Math.cos(eAng),ey=eCy+eR*.4*Math.sin(eAng);
    drawEagle(ctx,ex,ey,42,t);
    // Mountains
    const baseY=h*.64;
    drawMtnLayer(ctx,w,h,baseY,s.far,s.step,'#b9a8ef');
    // Snow on far peaks
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.moveTo(0,h);
    s.far.forEach((v,i)=>{const y=baseY-v,pk=v>h*.13;i===0?ctx.moveTo(i*s.step,pk?y:baseY):ctx.lineTo(i*s.step,pk?y:baseY-Math.max(0,v-h*.11));});
    ctx.lineTo(w,h);ctx.closePath();ctx.fill();
    drawMtnLayer(ctx,w,h,baseY+h*.05,s.mid,s.step,'#5fb6d8');
    drawMtnLayer(ctx,w,h,baseY+h*.12,s.near,s.step,'#4f8f78');
    // Cabin
    drawCabin(ctx,w*.38,h*.84,60);
    // Ground
    const grd2=ctx.createLinearGradient(0,h*.88,0,h);grd2.addColorStop(0,'#79c866');grd2.addColorStop(1,'#3f9d58');
    ctx.fillStyle=grd2;ctx.fillRect(0,h*.88,w,h*.12);
    // Snowflakes
    s.snowflakes.forEach(sf=>{const p=((age+sf.offset)%sf.period)/sf.period;const sy=h*.55*p,sx=sf.x+Math.sin(p*Math.PI*4+sf.offset)*sf.sz*3,al=p<.1?p/.1:p>.8?(1-p)/.2:1;star5(ctx,sx,sy,sf.sz,'#ffffff',al*.55);});
   }
  }
];

// ════════════════════════════════════════════════════════════
// TRANSITION ENGINE
// ════════════════════════════════════════════════════════════
const CVA=document.getElementById('bgA'),CVB=document.getElementById('bgB');
const XA=CVA.getContext('2d'),XB=CVB.getContext('2d');
const LBL=document.getElementById('scene-label');
function bgResize(){const W=window.innerWidth,H=window.innerHeight;[CVA,CVB].forEach(c=>{c.width=W;c.height=H;});}
window.addEventListener('resize',bgResize);bgResize();
const SCENE_DUR=15000,FADE_MS=2400;
let idxA=0,idxB=1,stA,stB,startA=0,fading=false,fadeStart=0;
function showLabel(n){LBL.textContent=n;LBL.classList.add('vis');setTimeout(()=>LBL.classList.remove('vis'),3200);}
function bgTick(ts){
  const w=CVA.width,h=CVA.height,ageA=ts-startA;
  try{SCENES[idxA].draw(XA,w,h,ageA,stA);}catch(e){console.warn('scene',idxA,'err',e);}
  if(fading){const ageB=ts-fadeStart;try{SCENES[idxB].draw(XB,w,h,ageB,stB);}catch(e){console.warn('scene',idxB,'err',e);}
    if(ageB>=FADE_MS){fading=false;idxA=idxB;stA=stB;startA=fadeStart;idxB=(idxA+1)%SCENES.length;CVB.style.transition='none';CVB.style.opacity='0';void CVB.offsetHeight;CVB.style.transition=`opacity ${FADE_MS/1000}s ease`;stB=SCENES[idxB].init(w,h);showLabel(SCENES[idxA].name);}
  }else if(ageA>=SCENE_DUR){fading=true;fadeStart=ts;stB=SCENES[idxB].init(w,h);CVB.style.opacity='1';}
  requestAnimationFrame(bgTick);
}
const _W=CVA.width,_H=CVA.height;
stA=SCENES[idxA].init(_W,_H);stB=SCENES[idxB].init(_W,_H);
startA=performance.now();showLabel(SCENES[idxA].name);requestAnimationFrame(bgTick);

// ════════════════════════════════════════════════════════════
// ROUNDS — split questions into 8 sets (one per page) + final
// ════════════════════════════════════════════════════════════
const ROUNDS = (() => {
  const icons = ['📖','✨','🔥','🌟','💡','🎯','🏆','🌈','⭐','🎶','🕊️','🌿'];
  // Detect all page numbers present in the data
  const pages = [...new Set(QUESTIONS.map(q => { const m = q.card.match(/Card (\d+)\./); return m ? Number(m[1]) : null; }).filter(n => n !== null))].sort((a,b)=>a-b);
  const rounds = [];
  const usedIdx = new Set();
  pages.forEach((p, i) => {
    const re = new RegExp('Card ' + p + '\\.');
    const qs = QUESTIONS.filter((q, idx) => { if (re.test(q.card)) { usedIdx.add(idx); return true; } return false; });
    const isLast = i === pages.length - 1;
    rounds.push({ label: isLast ? 'Final' : 'Set ' + p, sub: qs.length + ' întrebări · ' + (qs.length/6|0) + ' cărți', icon: icons[i] ?? '📚', qs, special: isLast });
  });
  // Catch any questions with no page pattern
  const extras = QUESTIONS.filter((_, i) => !usedIdx.has(i));
  if (extras.length) rounds.push({ label: 'Bonus', sub: extras.length + ' întrebări · ' + (extras.length/6|0) + ' cărți', icon: '🎁', qs: extras, special: true });
  return rounds;
})();

// ════════════════════════════════════════════════════════════
// QUIZ STATE
// ════════════════════════════════════════════════════════════
let activeQs = [], activeRoundIdx = -1;
let current=0, score=0, answered=false;
let selectedIdx = new Set();
let wrongAnswers = []; // Track incorrect questions for review
let showingReview = false; // Track if we're on review screen

function getLabels(n){ return n===2?['A','F']:n===3?['a','b','c']:['A','B','C','D']; }
function gridClass(n){ return n===2?'n2':n===3?'n3':''; }
function fmtQ(t){ return t.replace(/_{2,}/g,'<span class="blank">______</span>'); }

// ── Selector ──────────────────────────────────────────────
function showSelector(){
  document.getElementById('app').style.display='none';
  const sel=document.getElementById('selectorScreen');
  sel.style.display='block';
  const grid=document.getElementById('roundsGrid');
  grid.innerHTML=ROUNDS.map((r,i)=>
    `<button class="round-btn${r.special?' special':''}" onclick="startRound(${i})">
      <span class="rb-icon">${r.icon}</span>
      <span class="rb-name">${r.label}</span>
      <span class="rb-sub">${r.sub}</span>
    </button>`
  ).join('');
}

function startRound(idx){
  activeRoundIdx=idx;
  activeQs=ROUNDS[idx].qs;
  current=0; score=0; answered=false; selectedIdx=new Set(); wrongAnswers=[];
  document.getElementById('selectorScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('roundTitle').textContent=ROUNDS[idx].label + ' — ' + ROUNDS[idx].sub;
  render();
}

// ── Render ────────────────────────────────────────────────
function render(){
  const card=document.getElementById('quizCard');
  const TOTAL=activeQs.length;
  if(current>=TOTAL){
    if(!showingReview && wrongAnswers.length > 0){renderReview(card);}
    else{renderFinal(card);}
    return;
  }
  const q=activeQs[current];
  answered=false; selectedIdx=new Set();
  document.getElementById('progressBar').style.width=(current/TOTAL*100)+'%';
  document.getElementById('scoreDisplay').textContent=`Puncte: ${score} / ${current}`;
  const labels=getLabels(q.answers.length), gc=gridClass(q.answers.length);
  const isMulti=q.answers.length===3;
  const confirmBtn=isMulti?`<button class="btn-confirm" id="btnConfirm" style="display:none" onclick="confirmAnswer()">✓ Confirmă răspunsul</button>`:'';
  card.innerHTML=`<div class="card-label"><span class="dot"></span>${q.card}</div><div class="q-counter">Întrebarea ${current+1} din ${TOTAL}</div><div class="question-text">${fmtQ(q.question)}</div><div class="answers ${gc}">${q.answers.map((a,i)=>`<button class="answer-btn" onclick="choose(${i})" id="ans-${i}"><span class="letter">${labels[i]}</span>${a}</button>`).join('')}</div>${confirmBtn}<div class="feedback" id="feedback"></div><button class="btn-next" id="btnNext" style="display:none" onclick="nextQ()">${current+1<TOTAL?'Întrebarea următoare →':'Vezi rezultatul final →'}</button>`;
}

function choose(idx){
  const q=activeQs[current];
  if(q.answers.length===3){
    if(answered)return;
    const btn=document.getElementById(`ans-${idx}`);
    if(selectedIdx.has(idx)){selectedIdx.delete(idx);btn.classList.remove('selected');}
    else{selectedIdx.add(idx);btn.classList.add('selected');}
    const cb=document.getElementById('btnConfirm');
    if(cb)cb.style.display=selectedIdx.size>0?'block':'none';
    return;
  }
  if(answered)return; answered=true;
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(idx===q.correct){score++;document.getElementById(`ans-${idx}`).classList.add('correct');fb.className='feedback correct-fb show';fb.innerHTML=`✅ <strong>Corect!</strong> ${q.feedback}`;}
  else{
    document.getElementById(`ans-${idx}`).classList.add('wrong');
    document.getElementById(`ans-${q.correct}`).classList.add('correct');
    fb.className='feedback wrong-fb show';
    fb.innerHTML=`❌ <strong>Greșit.</strong> ${q.feedback}`;
    wrongAnswers.push({q, selected: q.answers[idx], correct: q.answers[q.correct], feedback: q.feedback});
  }
  document.getElementById('scoreDisplay').textContent=`Puncte: ${score} / ${current+1}`;
  document.getElementById('btnNext').style.display='block';
}

function confirmAnswer(){
  if(answered||selectedIdx.size===0)return;
  answered=true;
  const q=activeQs[current];
  const correctArr=(Array.isArray(q.correct)?[...q.correct]:[q.correct]).sort((a,b)=>a-b);
  const selected=[...selectedIdx].sort((a,b)=>a-b);
  const isCorrect=JSON.stringify(selected)===JSON.stringify(correctArr);
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  document.getElementById('btnConfirm').style.display='none';
  const fb=document.getElementById('feedback');
  if(isCorrect){
    score++;
    selected.forEach(i=>document.getElementById(`ans-${i}`).classList.add('correct'));
    fb.className='feedback correct-fb show';
    fb.innerHTML=`✅ <strong>Corect!</strong> ${q.feedback}`;
  } else {
    selected.forEach(i=>document.getElementById(`ans-${i}`).classList.add('wrong'));
    correctArr.forEach(i=>document.getElementById(`ans-${i}`).classList.add('correct'));
    fb.className='feedback wrong-fb show';
    fb.innerHTML=`❌ <strong>Greșit.</strong> ${q.feedback}`;
    const selectedText=selected.map(i=>q.answers[i]).join(', ');
    const correctText=correctArr.map(i=>q.answers[i]).join(', ');
    wrongAnswers.push({q, selected: selectedText, correct: correctText, feedback: q.feedback});
  }
  document.getElementById('scoreDisplay').textContent=`Puncte: ${score} / ${current+1}`;
  document.getElementById('btnNext').style.display='block';
}

function nextQ(){current++;render();document.getElementById('quizCard').scrollIntoView({behavior:'smooth',block:'start'});}

function renderReview(card){
  showingReview=true;
  document.getElementById('progressBar').style.width='100%';
  const html=`
    <div class="review-card">
      <div class="review-header">
        <h2>❌ Întrebări pe care le-ai greșit</h2>
        <p>${wrongAnswers.length} răspunsuri greșite din ${activeQs.length} total</p>
      </div>
      <div>
        ${wrongAnswers.map((w,i)=>`
          <div class="wrong-item">
            <div class="question-part">
              <div class="q-text">${i+1}. ${w.q.question.replace(/_{2,}/g,'______')}</div>
            </div>
            <div class="answer-row">
              <div>
                <strong style="color:#7f1d1d;">Te-ai răspuns:</strong>
                <div class="selected">${w.selected}</div>
              </div>
              <div>
                <strong style="color:#14532d;">Răspuns corect:</strong>
                <div class="correct">${w.correct}</div>
              </div>
            </div>
            <div class="feedback-text">📖 ${w.feedback}</div>
          </div>
        `).join('')}
      </div>
      <button class="review-btn" onclick="continueToFinal()">→ Vezi rezultatul final</button>
    </div>
  `;
  card.innerHTML=html;
}

function continueToFinal(){
  showingReview=false;
  const card=document.getElementById('quizCard');
  renderFinal(card);
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderFinal(card){
  const TOTAL=activeQs.length;
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('scoreDisplay').textContent=`Puncte: ${score} / ${TOTAL}`;
  const pct=Math.round(score/TOTAL*100);
  const[trophy,msg]=pct===100?['🏆','Extraordinar! Cunoști Cartea lui Ioan la perfecție! 🌟']:pct>=75?['🥇','Foarte bine! Cunoști Scriptura cu profunzime. 🎉']:pct>=50?['🥈','Bun! Mai studiază și vei deveni un expert. 💪']:['📖','Continuă să studiezi – Cuvântul lui Dumnezeu merită să fie cunoscut! ✨'];
  card.innerHTML=`<div class="final-card"><div class="trophy">${trophy}</div><h2>Quiz terminat!</h2><div class="score-big">${score}<span style="font-size:1.5rem;color:#999"> / ${TOTAL}</span></div><div class="score-label">${pct}% răspunsuri corecte</div><div class="msg">${msg}</div><button class="btn-next" onclick="restart()">🔄 Joacă din nou</button><button class="btn-next" style="margin-top:10px;background:rgba(255,255,255,.2);border:2px solid #7c3aed;color:#7c3aed" onclick="showSelector()">← Alege alt test</button></div>`;
}

function restart(){startRound(activeRoundIdx);}
showSelector();
</script>
