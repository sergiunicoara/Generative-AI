app = "graphrag-workers-sn"
primary_region = "ams"

[build]
  dockerfile = "../../Dockerfile"
  [build.args]
    SERVICE = "workers"

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONPATH = "/app"
  ENV = "production"
  LOG_LEVEL = "INFO"

# Workers don't expose HTTP - no [http_service] needed
[[mounts]]
  source = "kpi_data"
  destination = "/data"

[vm]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Combined worker runs ingestion + query on the same machine for Neo4j co-location
[processes]
  app = "python workers/combined_worker.py"
